<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>HTML 학습 페이지</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        background-color: #f5f5f5;
      }

      header {
        background-color: #333;
        color: white;
        text-align: center;
        padding: 20px;
      }

      /* section {
        margin: 20px;
        background-color: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      } */

      h1 {
        text-align: center;
        font-size: 64px;
      }
      h2 {
        color: #333;
      }

      button {
        background-color: green;
        color: white;
        padding: 10px;
        border: none;
        border-radius: 5px;
      }

      button:hover {
        background-color: darkgreen;
      }

      input {
        width: stretch;
        padding: 10px;
        margin: 5px 0;
        border-radius: 5px;
        border: 1px solid #ccc;
      }

      ul {
        list-style: none;
        padding: 0;
      }

      li {
        background-color: #eee;
        margin: 5px 0;
        padding: 10px;
      }
      form {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      @media (max-width: 600px) {
        body {
          font-size: 14px;
        }
      }

      img {
        max-width: 100%;
      }

      .card {
        margin: 20px;
        background-color: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      }

      .container {
        max-width: 800px;
        margin: auto;
      }

      .primary{
        background-color: green;
        color: white;
      }
      .secondary {
        background-color: gray;
        color: white;
       }
       .danger{
        background-color: red;
        color: white;
       }

       #intro {
        background-color: green;
       }

    </style>
  </head>
  <body>
    <header>
      <h1 id="title">HTML 학습</h1>
    </header>

    <main class="container">
      <section class="card" id="intro">
        <p>HTML은 <b>중요한</b> 웹 기술입니다.</p>
      </section>

      <section class="card">
        <h2>학습 목록</h2>
        <ul>
          <li>HTML</li>
          <li>CSS</li>
          <li>JavaScript</li>
        </ul>
      </section>

      <section class="card">
        <a href="https://developer.mozilla.org">HTML 공식 사이트</a>
      </section>

      <section class="card">
        <img src="https://http.cat/404" alt="샘플 이미지" />
      </section>

      <section class="card">
        <table border="1">
          <tr>
            <th>이름</th>
            <th>나이</th>
          </tr>
          <tr>
            <td>홍길동</td>
            <td>20</td>
          </tr>
        </table>
      </section>

      <section class="card">
        <button type="button" class="primary">클릭</button>
        <button type="submit" class="secondary"">제출</button>
        <button type="reset" class="danger">초기화</button>
      </section>

      <section class="card">
        <p id="preview"></p>
        <form>
          <input type="text" placeholder="이름" />
          <input type="email" placeholder="이메일" /><br />
          <button type="submit">제출</button>
          <button type="reset">초기화</button>
        </form>
      </section>
    </main>

    <footer>
      <p>HTML 학습 페이지</p>
    </footer>

    <script>
      console.log('페이지 로드 완료')
      
      const title = document.getElementById("title")
      console.log(title)

      title.innerText = "JS 적용 완료!"

      const intro = document.getElementById('intro')
      const ul = document.querySelector("ul")

      const btn = document.querySelector(".primary")
      btn.addEventListener('click', function(){
        console.log('버튼이 출력되었다.');
        alert('버튼이 출력되었다.');
        intro.style.backgroundColor = "blue"

        const li = document.createElement("li")
        li.innerText = "react"
        ul.appendChild(li);
      })

      const nameInput = document.querySelector('input[type="text"]')
      const emailInput = document.querySelector('input[type="email"]')
      // https://developer.mozilla.org/ko/docs/Web/API/Document/querySelector

      document.querySelector("form").addEventListener("submit", function(e) {
        e.preventDefault()

        if(nameInput.value === "" ){
          alert('이름을 입력하세요')
          return
        }

        console.log(nameInput.value)
        alert(nameInput.value, emailInput.value)
        alert(`name : ${nameInput.value} \n email : ${emailInput.value}`)
      })

      const preview = document.getElementById('preview')

      nameInput.addEventListener('input', function() {
        preview.innerText = nameInput.value;
      })

      ul.addEventListener('click', function(e){
        e.target.remove();
      })

    </script>
  </body>
</html>
